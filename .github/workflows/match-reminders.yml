name: Match Reminders

# Kickoff push reminders (no API-Football usage). Runs every 5 minutes.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kickoff push reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET is not set; skipping match reminders."
            exit 0
          fi
          curl -sf -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://alhabeed-api.vercel.app/api/cron/send-match-reminders"
