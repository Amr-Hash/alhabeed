name: Live Score Sync

# Free API-Football plan: 100 requests/day. Sync uses batched fixture IDs only
# during match windows (0 API calls when no matches are active). Poll every 15
# minutes → up to 96 cron runs/day, typically 1 API request per run when live.
# Set CRON_SECRET in repo secrets (same value as alhabeed-api on Vercel).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger live score sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET is not set; skipping live score sync."
            exit 0
          fi
          curl -sf -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://alhabeed-api.vercel.app/api/cron/sync-live-scores"
